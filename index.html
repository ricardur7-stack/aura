<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bypass</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0000 50%, #0f0f0f 100%);
            color: #ffffff;
            overflow: hidden;
            position: relative;
        }

        /* Efeito de fundo animado */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(255, 0, 0, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(100, 0, 0, 0.08) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            background: rgba(15, 15, 15, 0.8);
            backdrop-filter: blur(30px);
            border-radius: 20px;
            padding: 50px 40px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8),
                        inset 0 1px 0 rgba(255, 0, 0, 0.1),
                        0 0 40px rgba(255, 0, 0, 0.15);
            border: 2px solid rgba(255, 0, 0, 0.3);
            text-align: center;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #ff0000, #cc0000);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #ff0000;
            font-weight: 600;
        }

        .install-btn {
            display: inline-block;
            padding: 16px 50px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 12px;
            text-decoration: none;
            color: white;
            background: linear-gradient(135deg, #ff0000, #cc0000);
            box-shadow: 0 10px 30px rgba(255, 0, 0, 0.4),
                        0 0 20px rgba(255, 0, 0, 0.2);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: none;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .install-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .install-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .install-btn:hover {
            transform: translateY(-5px) scale(1.08);
            box-shadow: 0 15px 40px rgba(255, 0, 0, 0.6),
                        0 0 30px rgba(255, 0, 0, 0.3);
        }

        .install-btn:active {
            transform: translateY(-2px) scale(1.05);
        }

        .install-btn span {
            position: relative;
            z-index: 1;
        }

        .note {
            margin-top: 35px;
            font-size: 14px;
            opacity: 0.8;
            line-height: 1.5;
        }

        .note strong {
            color: #ff0000;
            font-weight: 700;
        }

        .footer {
            margin-top: 25px;
            font-size: 12px;
            opacity: 0.6;
            transition: opacity 0.3s ease;
            color: #ff0000;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .footer:hover {
            opacity: 1;
        }

        /* Responsivo */
        @media (max-width: 480px) {
            .container {
                padding: 40px 30px;
                max-width: 95%;
            }

            h1 {
                font-size: 32px;
            }

            .install-btn {
                padding: 14px 40px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>INJETAR BYPASS</h1>
        <div class="subtitle">Bypass 00</div>
        
        <a class="install-btn" href="ffmax://">
            <span>ATIVAR</span>
        </a>
        
        <div class="note">
            Nós somos <strong>00</strong>.
        </div>
        
        <div class="footer">
            by:rugal
        </div>
    </div>
</body>
</html>
