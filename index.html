<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bypass</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Space Mono', monospace;
            background: #000000;
            color: white;
            overflow: hidden;
            position: relative;
        }

        /* Fundo com efeitos múltiplos */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(255, 0, 0, 0.12) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(139, 0, 0, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 50% 0%, rgba(255, 50, 50, 0.1) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
            animation: backgroundPulse 8s ease-in-out infinite;
        }

        @keyframes backgroundPulse {
            0%, 100% {
                background: 
                    radial-gradient(circle at 20% 50%, rgba(255, 0, 0, 0.12) 0%, transparent 50%),
                    radial-gradient(circle at 80% 80%, rgba(139, 0, 0, 0.08) 0%, transparent 50%),
                    radial-gradient(circle at 50% 0%, rgba(255, 50, 50, 0.1) 0%, transparent 60%);
            }
            50% {
                background: 
                    radial-gradient(circle at 20% 50%, rgba(255, 0, 0, 0.18) 0%, transparent 50%),
                    radial-gradient(circle at 80% 80%, rgba(139, 0, 0, 0.12) 0%, transparent 50%),
                    radial-gradient(circle at 50% 0%, rgba(255, 50, 50, 0.15) 0%, transparent 60%);
            }
        }

        /* Grade animada */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(0deg, transparent 24%, rgba(255, 0, 0, 0.03) 25%, rgba(255, 0, 0, 0.03) 26%, transparent 27%, transparent 74%, rgba(255, 0, 0, 0.03) 75%, rgba(255, 0, 0, 0.03) 76%, transparent 77%, transparent),
                linear-gradient(90deg, transparent 24%, rgba(255, 0, 0, 0.03) 25%, rgba(255, 0, 0, 0.03) 26%, transparent 27%, transparent 74%, rgba(255, 0, 0, 0.03) 75%, rgba(255, 0, 0, 0.03) 76%, transparent 77%, transparent);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
            animation: gridScroll 20s linear infinite;
        }

        @keyframes gridScroll {
            0% {
                transform: translateY(0);
            }
            100% {
                transform: translateY(60px);
            }
        }

        .container {
            background: linear-gradient(135deg, rgba(15, 15, 15, 0.95) 0%, rgba(25, 0, 0, 0.95) 100%);
            backdrop-filter: blur(25px);
            border-radius: 18px;
            padding: 50px 45px;
            width: 90%;
            max-width: 420px;
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.5),
                0 0 80px rgba(255, 0, 0, 0.25),
                inset 0 1px 0 rgba(255, 255, 255, 0.12),
                inset 0 -1px 0 rgba(255, 0, 0, 0.1);
            text-align: center;
            border: 1.5px solid rgba(255, 0, 0, 0.25);
            position: relative;
            z-index: 1;
            animation: containerFloat 4s ease-in-out infinite;
        }

        @keyframes containerFloat {
            0%, 100% {
                transform: translateY(0px);
                box-shadow: 
                    0 20px 60px rgba(0, 0, 0, 0.5),
                    0 0 80px rgba(255, 0, 0, 0.25),
                    inset 0 1px 0 rgba(255, 255, 255, 0.12),
                    inset 0 -1px 0 rgba(255, 0, 0, 0.1);
            }
            50% {
                transform: translateY(-10px);
                box-shadow: 
                    0 30px 70px rgba(0, 0, 0, 0.6),
                    0 0 100px rgba(255, 0, 0, 0.35),
                    inset 0 1px 0 rgba(255, 255, 255, 0.12),
                    inset 0 -1px 0 rgba(255, 0, 0, 0.1);
            }
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            margin-bottom: 8px;
        }

        .icon-header {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: iconPulse 2.5s ease-in-out infinite;
        }

        .icon-svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 15px rgba(255, 0, 0, 0.6));
        }

        @keyframes iconPulse {
            0%, 100% {
                transform: scale(1);
                filter: drop-shadow(0 0 15px rgba(255, 0, 0, 0.6));
            }
            50% {
                transform: scale(1.08);
                filter: drop-shadow(0 0 25px rgba(255, 0, 0, 0.8));
            }
        }

        h2 {
            margin: 0;
            font-size: 32px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            background: linear-gradient(135deg, #ff0000, #ff4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2.5px;
            animation: titleGlow 2.5s ease-in-out infinite;
            filter: drop-shadow(0 0 10px rgba(255, 0, 0, 0.3));
        }

        @keyframes titleGlow {
            0%, 100% {
                filter: drop-shadow(0 0 10px rgba(255, 0, 0, 0.3));
            }
            50% {
                filter: drop-shadow(0 0 20px rgba(255, 0, 0, 0.5));
            }
        }

        .divider {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255, 0, 0, 0.4), transparent);
            margin: 18px auto 20px;
            animation: dividerGlow 2s ease-in-out infinite;
        }

        @keyframes dividerGlow {
            0%, 100% {
                box-shadow: 0 0 10px rgba(255, 0, 0, 0.2);
                opacity: 0.6;
            }
            50% {
                box-shadow: 0 0 20px rgba(255, 0, 0, 0.4);
                opacity: 1;
            }
        }

        .subtitle {
            font-size: 13px;
            opacity: 0.75;
            margin-bottom: 28px;
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            letter-spacing: 3.5px;
            color: #ff0000;
            font-weight: 700;
            animation: subtitlePulse 2.5s ease-in-out infinite;
        }

        @keyframes subtitlePulse {
            0%, 100% {
                opacity: 0.7;
            }
            50% {
                opacity: 1;
            }
        }

        .install-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 16px 45px;
            font-size: 17px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            border-radius: 10px;
            text-decoration: none;
            color: white;
            background: linear-gradient(135deg, #ff0000, #dd0000);
            box-shadow: 
                0 10px 30px rgba(255, 0, 0, 0.4),
                0 0 40px rgba(255, 0, 0, 0.25),
                inset 0 1px 0 rgba(255, 255, 255, 0.25);
            transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 1.5px solid rgba(255, 100, 100, 0.5);
            position: relative;
            overflow: hidden;
            letter-spacing: 1.5px;
            min-height: 50px;
        }

        .install-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
            z-index: 1;
        }

        .install-btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
            z-index: 0;
        }

        .install-btn:hover::before {
            left: 100%;
        }

        .install-btn:hover::after {
            width: 300px;
            height: 300px;
        }

        .install-btn:hover {
            transform: translateY(-4px) scale(1.06);
            box-shadow: 
                0 15px 40px rgba(255, 0, 0, 0.5),
                0 0 60px rgba(255, 0, 0, 0.35),
                inset 0 1px 0 rgba(255, 255, 255, 0.25);
        }

        .install-btn:active {
            transform: translateY(-1px) scale(1.02);
            animation: buttonPulse 0.6s ease-out;
        }

        .btn-text {
            position: relative;
            z-index: 2;
        }

        @keyframes buttonPulse {
            0% {
                box-shadow: 
                    0 15px 40px rgba(255, 0, 0, 0.5),
                    0 0 60px rgba(255, 0, 0, 0.35);
            }
            50% {
                box-shadow: 
                    0 15px 40px rgba(255, 0, 0, 0.7),
                    0 0 100px rgba(255, 0, 0, 0.5);
            }
            100% {
                box-shadow: 
                    0 15px 40px rgba(255, 0, 0, 0.5),
                    0 0 60px rgba(255, 0, 0, 0.35);
            }
        }

        .footer-section {
            margin-top: 28px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 0, 0, 0.15);
        }

        .note {
            font-size: 13px;
            opacity: 0.75;
            line-height: 1.5;
            letter-spacing: 0.3px;
            margin-bottom: 12px;
        }

        .note strong {
            color: #ff3333;
            font-weight: 700;
            filter: drop-shadow(0 0 4px rgba(255, 0, 0, 0.2));
        }

        .footer {
            font-size: 11px;
            opacity: 0.55;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1.2px;
            color: #ff0000;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .footer:hover {
            opacity: 0.85;
            filter: drop-shadow(0 0 8px rgba(255, 0, 0, 0.3));
        }

        @media (max-width: 480px) {
            .container {
                padding: 40px 30px;
                max-width: 95%;
            }

            h2 {
                font-size: 28px;
                letter-spacing: 2px;
            }

            .icon-header {
                width: 40px;
                height: 40px;
            }

            .install-btn {
                padding: 14px 35px;
                font-size: 15px;
                letter-spacing: 1px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="icon-header">
                <svg class="icon-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#ff3333;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#ff0000;stop-opacity:1" />
                        </linearGradient>
                        <filter id="glow">
                            <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
                            <feMerge>
                                <feMergeNode in="coloredBlur"/>
                                <feMergeNode in="SourceGraphic"/>
                            </feMerge>
                        </filter>
                    </defs>
                    
                    <!-- Círculo externo -->
                    <circle cx="50" cy="50" r="45" fill="none" stroke="url(#iconGradient)" stroke-width="2.5" opacity="0.8"/>
                    
                    <!-- Raio central (vertical) -->
                    <line x1="50" y1="15" x2="50" y2="85" stroke="url(#iconGradient)" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>
                    
                    <!-- Raio diagonal esquerda -->
                    <line x1="25" y1="30" x2="75" y2="70" stroke="url(#iconGradient)" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
                    
                    <!-- Raio diagonal direita -->
                    <line x1="75" y1="30" x2="25" y2="70" stroke="url(#iconGradient)" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
                    
                    <!-- Círculo central -->
                    <circle cx="50" cy="50" r="8" fill="url(#iconGradient)" filter="url(#glow)"/>
                    
                    <!-- Pontos de energia -->
                    <circle cx="50" cy="20" r="3" fill="url(#iconGradient)" opacity="0.8"/>
                    <circle cx="80" cy="50" r="3" fill="url(#iconGradient)" opacity="0.8"/>
                    <circle cx="50" cy="80" r="3" fill="url(#iconGradient)" opacity="0.8"/>
                    <circle cx="20" cy="50" r="3" fill="url(#iconGradient)" opacity="0.8"/>
                </svg>
            </div>
            <h2>BYPASS</h2>
        </div>
        
        <div class="divider"></div>
        
        <div class="subtitle">v00</div>

        <a class="install-btn" href="ffmax://">
            <span class="btn-text">ATIVAR</span>
        </a>

        <div class="footer-section">
            <div class="note">
                Desenvolvido por <strong>rugal</strong>
            </div>
            
            <div class="footer">
                by:rugal
            </div>
        </div>
    </div>
</body>
</html>
