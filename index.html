<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bypass Rugal</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Space Mono', monospace;
            background: #000000;
            color: #ffffff;
            overflow: hidden;
            position: relative;
        }

        /* Fundo com efeito de grade animada */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(0deg, transparent 24%, rgba(255, 0, 0, 0.05) 25%, rgba(255, 0, 0, 0.05) 26%, transparent 27%, transparent 74%, rgba(255, 0, 0, 0.05) 75%, rgba(255, 0, 0, 0.05) 76%, transparent 77%, transparent),
                linear-gradient(90deg, transparent 24%, rgba(255, 0, 0, 0.05) 25%, rgba(255, 0, 0, 0.05) 26%, transparent 27%, transparent 74%, rgba(255, 0, 0, 0.05) 75%, rgba(255, 0, 0, 0.05) 76%, transparent 77%, transparent);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% {
                transform: translateY(0);
            }
            100% {
                transform: translateY(50px);
            }
        }

        /* Luzes de fundo */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(255, 0, 0, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(139, 0, 0, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            background: linear-gradient(135deg, rgba(10, 10, 10, 0.95) 0%, rgba(30, 0, 0, 0.95) 100%);
            backdrop-filter: blur(40px);
            border-radius: 15px;
            padding: 60px 50px;
            width: 90%;
            max-width: 500px;
            box-shadow: 
                0 0 60px rgba(255, 0, 0, 0.3),
                0 0 100px rgba(255, 0, 0, 0.15),
                inset 0 0 60px rgba(255, 0, 0, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 0, 0, 0.4);
            text-align: center;
            animation: containerGlow 3s ease-in-out infinite;
        }

        @keyframes containerGlow {
            0%, 100% {
                box-shadow: 
                    0 0 60px rgba(255, 0, 0, 0.3),
                    0 0 100px rgba(255, 0, 0, 0.15),
                    inset 0 0 60px rgba(255, 0, 0, 0.1),
                    inset 0 1px 0 rgba(255, 255, 255, 0.1);
            }
            50% {
                box-shadow: 
                    0 0 80px rgba(255, 0, 0, 0.4),
                    0 0 120px rgba(255, 0, 0, 0.2),
                    inset 0 0 80px rgba(255, 0, 0, 0.15),
                    inset 0 1px 0 rgba(255, 255, 255, 0.1);
            }
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 48px;
            font-weight: 900;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #ff0000, #ff3333, #cc0000);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 3px;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
            animation: titlePulse 2s ease-in-out infinite;
            filter: drop-shadow(0 0 10px rgba(255, 0, 0, 0.4));
        }

        @keyframes titlePulse {
            0%, 100% {
                filter: drop-shadow(0 0 10px rgba(255, 0, 0, 0.4));
                transform: scale(1);
            }
            50% {
                filter: drop-shadow(0 0 20px rgba(255, 0, 0, 0.6));
                transform: scale(1.02);
            }
        }

        .subtitle {
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            opacity: 0.9;
            margin-bottom: 45px;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #ff0000;
            font-weight: 700;
            animation: subtitleGlow 2s ease-in-out infinite;
            filter: drop-shadow(0 0 8px rgba(255, 0, 0, 0.3));
        }

        @keyframes subtitleGlow {
            0%, 100% {
                opacity: 0.8;
                filter: drop-shadow(0 0 8px rgba(255, 0, 0, 0.3));
            }
            50% {
                opacity: 1;
                filter: drop-shadow(0 0 15px rgba(255, 0, 0, 0.5));
            }
        }

        .install-btn {
            display: inline-block;
            padding: 18px 60px;
            font-size: 17px;
            font-weight: 700;
            font-family: 'Orbitron', sans-serif;
            border-radius: 8px;
            text-decoration: none;
            color: white;
            background: linear-gradient(135deg, #ff0000, #ff3333);
            box-shadow: 
                0 0 30px rgba(255, 0, 0, 0.5),
                0 0 60px rgba(255, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 2px solid rgba(255, 100, 100, 0.5);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .install-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .install-btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .install-btn:hover::before {
            left: 100%;
        }

        .install-btn:hover::after {
            width: 300px;
            height: 300px;
        }

        .install-btn:hover {
            transform: translateY(-6px) scale(1.1);
            box-shadow: 
                0 0 50px rgba(255, 0, 0, 0.7),
                0 0 100px rgba(255, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
            letter-spacing: 3px;
        }

        .install-btn:active {
            transform: translateY(-2px) scale(1.05);
            animation: buttonClick 0.6s ease-out;
        }

        .install-btn span {
            position: relative;
            z-index: 2;
        }

        @keyframes buttonClick {
            0% {
                box-shadow: 
                    0 0 50px rgba(255, 0, 0, 0.7),
                    0 0 100px rgba(255, 0, 0, 0.4),
                    0 0 150px rgba(255, 0, 0, 0.3);
            }
            50% {
                box-shadow: 
                    0 0 80px rgba(255, 0, 0, 0.9),
                    0 0 150px rgba(255, 0, 0, 0.6),
                    0 0 200px rgba(255, 0, 0, 0.4);
            }
            100% {
                box-shadow: 
                    0 0 50px rgba(255, 0, 0, 0.7),
                    0 0 100px rgba(255, 0, 0, 0.4),
                    inset 0 1px 0 rgba(255, 255, 255, 0.3);
            }
        }

        .note {
            margin-top: 40px;
            font-size: 15px;
            opacity: 0.85;
            line-height: 1.6;
            letter-spacing: 0.5px;
        }

        .note strong {
            color: #ff3333;
            font-weight: 700;
            filter: drop-shadow(0 0 5px rgba(255, 0, 0, 0.3));
        }

        .footer {
            margin-top: 30px;
            font-size: 13px;
            opacity: 0.7;
            transition: all 0.3s ease;
            color: #ff0000;
            font-weight: 600;
            letter-spacing: 1px;
            font-family: 'Orbitron', sans-serif;
            filter: drop-shadow(0 0 5px rgba(255, 0, 0, 0.2));
        }

        .footer:hover {
            opacity: 1;
            filter: drop-shadow(0 0 10px rgba(255, 0, 0, 0.4));
        }

        /* Efeito de ativação */
        .activated .install-btn {
            animation: activationPulse 0.8s ease-out;
        }

        @keyframes activationPulse {
            0% {
                box-shadow: 
                    0 0 50px rgba(255, 0, 0, 0.7),
                    0 0 100px rgba(255, 0, 0, 0.4);
            }
            50% {
                box-shadow: 
                    0 0 100px rgba(255, 0, 0, 1),
                    0 0 200px rgba(255, 0, 0, 0.6);
            }
            100% {
                box-shadow: 
                    0 0 50px rgba(255, 0, 0, 0.7),
                    0 0 100px rgba(255, 0, 0, 0.4);
            }
        }

        /* Responsivo */
        @media (max-width: 600px) {
            .container {
                padding: 45px 35px;
                max-width: 95%;
            }

            h1 {
                font-size: 38px;
                letter-spacing: 2px;
            }

            .subtitle {
                font-size: 14px;
                letter-spacing: 3px;
            }

            .install-btn {
                padding: 16px 50px;
                font-size: 15px;
                letter-spacing: 1.5px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>INJETAR</h1>
        <h1 style="margin-top: -10px; margin-bottom: 15px;">BYPASS</h1>
        <div class="subtitle">Bypass 00</div>
        
        <a class="install-btn" href="ffmax://" onclick="handleActivation(event)">
            <span>ATIVAR AGORA</span>
        </a>
        
        <div class="note">
            Nós somos <strong>00</strong>.
        </div>
        
        <div class="footer">
            by:rugal
        </div>
    </div>

    <script>
        function handleActivation(event) {
            const container = document.querySelector('.container');
            container.classList.add('activated');
            
            // Criar partículas de efeito
            createParticles();
            
            // Remover a classe após a animação
            setTimeout(() => {
                container.classList.remove('activated');
            }, 800);
        }

        function createParticles() {
            const container = document.querySelector('.container');
            const particleCount = 12;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.style.position = 'fixed';
                particle.style.width = '8px';
                particle.style.height = '8px';
                particle.style.background = 'rgba(255, 0, 0, 0.8)';
                particle.style.borderRadius = '50%';
                particle.style.boxShadow = '0 0 10px rgba(255, 0, 0, 0.8)';
                particle.style.pointerEvents = 'none';
                particle.style.zIndex = '9999';
                
                const rect = container.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                
                particle.style.left = centerX + 'px';
                particle.style.top = centerY + 'px';
                
                document.body.appendChild(particle);
                
                const angle = (i / particleCount) * Math.PI * 2;
                const velocity = 5 + Math.random() * 5;
                const vx = Math.cos(angle) * velocity;
                const vy = Math.sin(angle) * velocity;
                
                let x = centerX;
                let y = centerY;
                let life = 1;
                
                const animate = () => {
                    x += vx;
                    y += vy;
                    life -= 0.02;
                    
                    particle.style.left = x + 'px';
                    particle.style.top = y + 'px';
                    particle.style.opacity = life;
                    
                    if (life > 0) {
                        requestAnimationFrame(animate);
                    } else {
                        particle.remove();
                    }
                };
                
                animate();
            }
        }
    </script>
</body>
</html>
